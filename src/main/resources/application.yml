simbot:
  application:
    application-launch-mode: thread
openai:
  api-key: ${OPENAI_API_KEY}
  endpoint: ${OPENAI_ENDPOINT:https://api.deepseek.com}
  max-tokens: 500
  timeout: 60000
spring:
  datasource:
    url: jdbc:h2:file:./lq2bot/data/live_records;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.H2Dialect